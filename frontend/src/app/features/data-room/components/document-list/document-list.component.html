<div class="doc-wrap">
  <div class="empty" *ngIf="!loading && documents.length === 0">
    No documents in this folder yet.
  </div>

  <div class="loading" *ngIf="loading">
    <mat-spinner diameter="36"></mat-spinner>
    <span>Loading documents…</span>
  </div>

  <table mat-table [dataSource]="documents" *ngIf="!loading && documents.length > 0" class="mat-elevation-z0">
    <ng-container matColumnDef="fileName">
      <th mat-header-cell *matHeaderCellDef>File</th>
      <td mat-cell *matCellDef="let row">{{ row.fileName }}</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let row">
        <span class="type-pill">{{ row.type }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="uploadDate">
      <th mat-header-cell *matHeaderCellDef>Uploaded</th>
      <td mat-cell *matCellDef="let row">{{ formatDate(row.uploadDate) }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="actions-col"></th>
      <td mat-cell *matCellDef="let row" class="actions-col">
        <button mat-icon-button type="button" matTooltip="View" (click)="view.emit(row)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button type="button" matTooltip="Download" (click)="download.emit(row)">
          <mat-icon>download</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
